<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Mom ❤️</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:'Segoe UI',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.background{
    position:fixed;
    width:100%;
    height:100%;
    background:radial-gradient(circle at top,#ff8fab,#111);
}

.container{
    position:relative;
    z-index:2;
    text-align:center;
    width:90%;
    max-width:800px;
}

.line{
    opacity:0;
    font-size:1.5rem;
    margin:18px 0;
    transform:translateY(20px);
    animation:fadeUp 1.5s forwards;
}

.line:nth-child(1){animation-delay:1s;}
.line:nth-child(2){animation-delay:4s;}
.line:nth-child(3){animation-delay:7s;}
.line:nth-child(4){animation-delay:10s;}
.line:nth-child(5){animation-delay:13s;}
.line:nth-child(6){animation-delay:16s;}

@keyframes fadeUp{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.heart{
    position:absolute;
    color:#ff4d6d;
    animation:float linear infinite;
    opacity:0.7;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-10vh);
    }
}

</style>
</head>

<body>

<div class="background"></div>

<div class="container">

    <div class="line">Happy Mother's Day Mom ❤️</div>

    <div class="line">
        Thank you for loving me even on my worst days
    </div>

    <div class="line">
        Thank you for every sacrifice I never noticed
    </div>

    <div class="line">
        No matter how old I grow...
    </div>

    <div class="line">
        your presence will always feel like home
    </div>

    <div class="line">
        Love always,<br><br>
        Isha ❤️
    </div>

</div>

<script>

function createHeart(){

    const heart=document.createElement('div');
    heart.classList.add('heart');
    heart.innerHTML='❤️';

    heart.style.left=Math.random()*100+'vw';
    heart.style.fontSize=(Math.random()*20+10)+'px';
    heart.style.animationDuration=(Math.random()*5+5)+'s';

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },10000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
